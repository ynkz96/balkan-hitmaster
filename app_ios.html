<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Balkan HitMaster iOS</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        body { background: #0A0A0B; color: white; font-family: sans-serif; margin: 0; overflow: hidden; }
        
        /* Splash Screen */
        #splash {
            position: fixed; top:0; left:0; width:100%; height:100%; 
            background: #000; z-index: 1000; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; transition: 0.5s;
        }
        .splash-logo { color: #FF4D4D; font-size: 2rem; font-weight: 900; letter-spacing: 5px; margin-bottom: 20px; }
        .disclaimer { font-size: 0.8rem; opacity: 0.6; text-align: center; max-width: 250px; margin-bottom: 40px; }
        .start-btn { 
            background: #FF4D4D; color: white; border: none; padding: 18px 40px; 
            border-radius: 50px; font-weight: bold; cursor: pointer; font-size: 1.1rem;
        }

        /* Main UI */
        #scanner-container { position: relative; width: 100%; height: 100vh; }
        #video { width: 100%; height: 100%; object-fit: cover; }
        .scan-overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 250px; height: 250px; border: 2px solid #FF4D4D; border-radius: 20px;
            box-shadow: 0 0 0 2000px rgba(0,0,0,0.7); pointer-events: none;
        }
        .scan-line {
            position: absolute; top:0; left:0; width:100%; height:2px; background: #FF4D4D;
            box-shadow: 0 0 10px #FF4D4D; animation: scan 2s linear infinite;
        }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
        
        #yt-player { position: absolute; bottom: 0; width: 100%; height: 40vh; background: #000; display: none; z-index: 100; }
        canvas { display: none; }
    </style>
</head>
<body>

    <div id="splash">
        <div class="splash-logo">BALKAN<br>HITMASTER</div>
        <div class="disclaimer">UPOZORENJE: Igra uzrokuje pretjerano pjevanje i lomljenje čaša. Koristite na vlastitu odgovornost.</div>
        <button class="start-btn" onclick="initApp()">HAJDE DA LUDUJEMO!</button>
    </div>

    <div id="scanner-container">
        <video id="video" playsinline muted autoplay></video>
        <div class="scan-overlay"><div class="scan-line"></div></div>
        <canvas id="canvas"></canvas>
        <div id="yt-player">
            <iframe id="iframe" width="100%" height="100%" frameborder="0" allow="autoplay"></iframe>
            <button onclick="closePlayer()" style="position:absolute; top:-40px; right:10px; background:#FF4D4D; color:white; border:none; padding:10px 20px; border-radius:10px;">ZATVORI</button>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const splash = document.getElementById('splash');

        function initApp() {
            splash.style.opacity = '0';
            setTimeout(() => splash.style.display = 'none', 500);
            startScanner();
        }

        function startScanner() {
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
                .then(stream => {
                    video.srcObject = stream;
                    video.setAttribute("playsinline", true);
                    video.play();
                    requestAnimationFrame(tick);
                });
        }

        function tick() {
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                canvas.width = 400; // Manji canvas = brže procesiranje
                canvas.height = 400;
                
                // Crtamo središnji dio kamere u kvadratni canvas
                ctx.drawImage(video, (video.videoWidth-400)/2, (video.videoHeight-400)/2, 400, 400, 0, 0, 400, 400);
                
                const imageData = ctx.getImageData(0, 0, 400, 400);
                const data = imageData.data;

                // RED FILTER (KLJUČ ZA TVOJE KARTE):
                // Izolujemo crvenu boju i pojačavamo kontrast do ekstrema
                for (let i = 0; i < data.length; i += 4) {
                    let r = data[i];
                    let g = data[i+1];
                    let b = data[i+2];
                    
                    // Ako je boja pretežno crvena, pretvori u crnu, ostalo u bijelu
                    if (r > 100 && g < 100 && b < 100) {
                        data[i] = data[i+1] = data[i+2] = 0; // Black
                    } else {
                        data[i] = data[i+1] = data[i+2] = 255; // White
                    }
                }
                
                const code = jsQR(data, 400, 400);
                if (code) {
                    handleScan(code.data);
                    return; // Zaustavi tick dok traje pjesma
                }
            }
            requestAnimationFrame(tick);
        }

        function handleScan(id) {
            const videoId = id.match(/[a-zA-Z0-9_-]{11}/);
            if (videoId) {
                document.getElementById('iframe').src = `https://www.youtube.com/embed/${videoId[0]}?autoplay=1`;
                document.getElementById('yt-player').style.display = 'block';
            }
        }

        function closePlayer() {
            document.getElementById('yt-player').style.display = 'none';
            document.getElementById('iframe').src = "";
            requestAnimationFrame(tick);
        }
    </script>
</body>
</html>
