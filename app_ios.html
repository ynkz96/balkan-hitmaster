<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Balkan HitMaster iOS</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff4d4d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<script src="https://cdn.jsdelivr.net/npm/jsqr/dist/jsQR.js"></script>

<style>
body {
    background: #0a0a0b;
    color: white;
    font-family: sans-serif;
    text-align: center;
    margin: 0;
}

video, canvas {
    width: 90%;
    max-width: 320px;
    border-radius: 20px;
    margin-top: 20px;
}

button {
    background: #ff4d4d;
    color: white;
    border: none;
    padding: 15px 30px;
    border-radius: 40px;
    font-size: 16px;
    margin-top: 20px;
}

#yt-hidden {
    position: absolute;
    left: -9999px;
}
</style>
</head>

<body>

<h2>Balkan HitMaster iOS</h2>

<button onclick="startCamera()">Pokreni kameru</button>

<br>
<video id="video" autoplay playsinline></video>
<canvas id="canvas" hidden></canvas>

<p id="status">Čekam kameru...</p>

<button onclick="playSong()">Pusti muziku</button>
<button onclick="stopSong()">Stop</button>

<div id="yt-hidden"></div>

<script>
let video = document.getElementById("video");
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");
let scanning = false;
let currentId = "";

async function startCamera() {
    const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "environment" }
    });
    video.srcObject = stream;
    scanning = true;
    scanFrame();
}

function scanFrame() {
    if (!scanning) return;

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

    let imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);

    // RED TO GRAYSCALE FILTER
    for (let i = 0; i < imageData.data.length; i += 4) {
        let r = imageData.data[i];
        let g = imageData.data[i+1];
        let b = imageData.data[i+2];
        let gray = (r * 0.6 + g * 0.3 + b * 0.1);
        imageData.data[i] = gray;
        imageData.data[i+1] = gray;
        imageData.data[i+2] = gray;
    }

    ctx.putImageData(imageData, 0, 0);

    let code = jsQR(imageData.data, canvas.width, canvas.height);

    if (code) {
        scanning = false;
        currentId = code.data.trim();
        document.getElementById("status").innerText = "QR očitan!";
    } else {
        requestAnimationFrame(scanFrame);
    }
}

function playSong() {
    if(currentId.length < 5) return;

    document.getElementById("yt-hidden").innerHTML =
    `<iframe width="100" height="100"
    src="https://www.youtube.com/embed/${currentId}?autoplay=1"
    allow="autoplay"></iframe>`;
}

function stopSong() {
    document.getElementById("yt-hidden").innerHTML = "";
}
</script>

</body>
</html>
