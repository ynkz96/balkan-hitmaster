<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Balkan Hitster - YT Fix</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; }
        #reader { width: 100%; max-width: 350px; margin: auto; border-radius: 20px; overflow: hidden; border: 3px solid #FF0000; }
        .status { color: #FF0000; margin: 15px; font-weight: bold; font-size: 16px; }
        
        /* Skriveni kontejner za YouTube */
        #yt-hidden { width: 1px; height: 1px; opacity: 0; position: absolute; }
        
        .action-btn { 
            background: #FF0000; border: none; padding: 20px 40px; color: white; 
            border-radius: 50px; font-weight: bold; font-size: 18px; cursor: pointer; 
            margin-top: 20px; display: none; width: 80%;
        }
        #stop-btn { background: #444; margin-top: 15px; }
    </style>
</head>
<body>

    <h2 style="color:#FF0000">BALKAN <span style="color:white">HITSTER</span></h2>
    
    <div id="reader"></div>
    <div id="status" class="status">SKENIRAJ KARTICU</div>

    <div id="yt-hidden"></div>

    <button id="play-btn" class="action-btn">▶ PUSTI MUZIKU</button>
    <button id="stop-btn" class="action-btn">❌ STOP / SLEDEĆA</button>

    <script>
        let currentId = "";
        const statusDiv = document.getElementById('status');
        const playBtn = document.getElementById('play-btn');
        const stopBtn = document.getElementById('stop-btn');
        const ytContainer = document.getElementById('yt-hidden');

        function onScanSuccess(decodedText) {
            // Uzimamo samo ID (ako je skeniran pun link, čistimo ga)
            currentId = decodedText.trim();
            if(currentId.includes("id=")) currentId = currentId.split("id=")[1];

            statusDiv.innerText = "PESMA PRONAĐENA!";
            playBtn.style.display = "inline-block"; // Pokazujemo dugme za play
            
            html5QrcodeScanner.pause(); // Pauziramo kameru
        }

        // KLJUČNI DEO: Korisnik mora kliknuti da bi browser dozvolio zvuk
        playBtn.addEventListener('click', function() {
            ytContainer.innerHTML = `
                <iframe width="100" height="100" 
                src="https://www.youtube.com/embed/${currentId}?autoplay=1" 
                allow="autoplay; encrypted-media"></iframe>`;
            
            statusDiv.innerText = "MUZIKA SVIRA...";
            playBtn.style.display = "none";
            stopBtn.style.display = "inline-block";
        });

        function stopMusic() {
            ytContainer.innerHTML = ""; // Brišemo player
            stopBtn.style.display = "none";
            statusDiv.innerText = "SKENIRAJ NOVU KARTU";
            html5QrcodeScanner.resume(); // Ponovo palimo kameru
        }

        let html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
        html5QrcodeScanner.render(onScanSuccess);
    </script>
</body>
</html>
