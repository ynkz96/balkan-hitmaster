<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Balkan HitMaster Party Game</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --primary: #ff4d4d;
            --bg: #0a0a0b;
            --text: #ffffff;
        }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at 50% 50%, #1a1a1c 0%, #0a0a0b 100%);
            color: var(--text);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .header { margin: 20px 0 30px 0; }
        .header h1 {
            font-size: 28px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin: 0;
            background: linear-gradient(to right, #ff4d4d, #ff9494);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header p { font-size: 12px; letter-spacing: 5px; opacity: 0.5; margin-top: 5px; text-transform: uppercase; }

        #reader-wrapper {
            width: 100%;
            max-width: 340px;
            position: relative;
        }

        #reader {
            width: 100%;
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: #000;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
        }

        .status-box { margin: 25px 0; min-height: 24px; }
        #status { font-size: 14px; font-weight: 600; color: var(--primary); text-transform: uppercase; letter-spacing: 1px; }

        .btn-container {
            width: 100%;
            max-width: 340px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .action-btn {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Gumb za pokretanje kamere - KLJUČ ZA BRAVE */
        #start-camera-btn {
            background: white;
            color: black;
            display: block;
            margin: 20px auto;
        }

        #play-btn {
            background: var(--primary);
            color: white;
            display: none;
            box-shadow: 0 8px 20px rgba(255, 77, 77, 0.3);
        }

        #stop-btn {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: none;
        }

        .action-btn:active { transform: scale(0.96); }

        #yt-hidden { position: absolute; width: 1px; height: 1px; opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Balkan HitMaster</h1>
        <p>Party Game</p>
    </div>
    
    <div id="reader-wrapper">
        <div id="reader"></div>
        <button id="start-camera-btn" class="action-btn" onclick="initScanner()">📷 Pokreni skener</button>
    </div>

    <div class="status-box">
        <div id="status">Sustav spreman</div>
    </div>

    <div id="yt-hidden"></div>

    <div class="btn-container">
        <button id="play-btn" class="action-btn" onclick="startPlayback()">▶ Pusti muziku</button>
        <button id="stop-btn" class="action-btn" onclick="stopMusic()">✕ Iduća kartica</button>
    </div>

    <script>
        let currentId = "";
        let html5QrcodeScanner;
        const statusDiv = document.getElementById('status');
        const playBtn = document.getElementById('play-btn');
        const stopBtn = document.getElementById('stop-btn');
        const startCamBtn = document.getElementById('start-camera-btn');
        const ytContainer = document.getElementById('yt-hidden');

        // Funkcija koja se pokreće na klik gumba za kameru
        function initScanner() {
            startCamBtn.style.display = "none";
            statusDiv.innerText = "Tražim kameru...";

            html5QrcodeScanner = new Html5QrcodeScanner("reader", { 
                fps: 15, 
                qrbox: { width: 250, height: 250 },
                aspectRatio: 1.0,
                rememberLastUsedCamera: true
            });

            html5QrcodeScanner.render(onScanSuccess, onScanFailure);
        }

        function onScanSuccess(decodedText) {
            currentId = decodedText.trim();
            if(currentId.includes("id=")) currentId = currentId.split("id=")[1];
            if(currentId.includes("v=")) currentId = currentId.split("v=")[1].substring(0,11);
            
            if(currentId.length >= 11) {
                statusDiv.innerText = "KARTA OČITANA!";
                playBtn.style.display = "block";
                html5QrcodeScanner.pause();
                if (navigator.vibrate) navigator.vibrate(100);
            }
        }

        function onScanFailure(error) {
            // Ignoriramo stalne pogreške dok ne nađe kod
        }

        function startPlayback() {
            ytContainer.innerHTML = `
                <iframe id="yt-frame" width="100" height="100" 
                src="https://www.youtube.com/embed/${currentId}?autoplay=1&enablejsapi=1&rel=0" 
                allow="autoplay; encrypted-media"></iframe>`;
            
            statusDiv.innerText = "Muzika svira...";
            playBtn.style.display = "none";
            stopBtn.style.display = "block";
        }

        function stopMusic() {
            // Brisanje iframe-a zaustavlja zvuk
            ytContainer.innerHTML = ""; 
            stopBtn.style.display = "none";
            statusDiv.innerText = "Skeniraj novu kartu";
            
            if (html5QrcodeScanner) {
                html5QrcodeScanner.resume();
            }
        }
    </script>
</body>
</html>
